<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPMB 2026 - UPTD SDN 21 SANGGALEA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #060b13;
            --panel-bg: rgba(10, 20, 38, 0.7);
            --primary-neon: #00f2fe;
            --secondary-neon: #4facfe;
            --success-neon: #00ff87;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border-glow: rgba(0, 242, 254, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, var(--bg-color) 100%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Animasi Grid Teknologi */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* HEADER FUTURISTIK */
        header {
            background: linear-gradient(135deg, rgba(15, 118, 110, 0.2), rgba(13, 148, 136, 0.05));
            border: 1px solid rgba(13, 148, 136, 0.3);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        /* STYLE LOGO SEMATAN */
        .logo-container {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-high-tech {
            width: 85px;
            height: 85px;
            filter: drop-shadow(0 0 8px var(--primary-neon));
            animation: logoPulse 3s infinite alternate ease-in-out;
        }

        @keyframes logoPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 6px var(--primary-neon)); }
            100% { transform: scale(1.05); filter: drop-shadow(0 0 16px var(--secondary-neon)); }
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary-neon);
            margin-bottom: 5px;
        }

        header p {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            color: var(--primary-neon);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* NAVIGATION & TOGGLE PANEL */
        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-toggle {
            font-family: 'Rajdhani', sans-serif;
            background: transparent;
            color: var(--primary-neon);
            border: 1px solid var(--primary-neon);
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
        }

        .btn-toggle:hover {
            background: var(--primary-neon);
            color: #000;
            box-shadow: 0 0 15px var(--primary-neon);
        }

        /* FORM STYLE (GLASSMORPHISM) */
        .panel-card {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 30px;
        }

        .panel-card h2 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.4rem;
            color: var(--primary-neon);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(45%, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.9rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .form-group input, .form-group select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 12px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary-neon);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group select option {
            background: #0f172a;
            color: #fff;
        }

        /* BUTTON ACTION */
        .btn-submit {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #00ff87 0%, #60efa0 100%);
            color: #042f1a;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 135, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 255, 135, 0.5);
        }

        /* ADMIN TABLE STYLE */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        th {
            background: rgba(0, 242, 254, 0.1);
            color: var(--primary-neon);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid var(--primary-neon);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .btn-print {
            background: rgba(0, 242, 254, 0.15);
            border: 1px solid var(--primary-neon);
            color: var(--primary-neon);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-print:hover {
            background: var(--primary-neon);
            color: #000;
        }

        .hidden { display: none; }

        /* PRINT STYLESHEET OPTIMIZATION */
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea {
                position: absolute;
                left: 0; top: 0; width: 100%;
                color: #000 !important;
                background: #fff !important;
                padding: 20px;
            }
            .no-print { display: none !important; }
            .print-header {
                text-align: center;
                border-bottom: 3px double #000;
                padding-bottom: 10px;
                margin-bottom: 20px;
            }
            .print-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 20px;
            }
            .print-table th, .print-table td {
                border: 1px solid #000 !important;
                padding: 10px !important;
                color: #000 !important;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-container">
                <svg class="logo-high-tech" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="50,5 92,25 92,75 50,95 8,75 8,25" fill="none" stroke="#00f2fe" stroke-width="3"/>
                    <polygon points="50,13 84,30 84,70 50,87 16,70 16,30" fill="none" stroke="#4facfe" stroke-width="1.5" stroke-dasharray="4 3"/>
                    <circle cx="50" cy="53" r="18" fill="none" stroke="#00ff87" stroke-width="2"/>
                    <path d="M38,48 L50,40 L62,48 L50,56 Z" fill="#00f2fe"/>
                    <path d="M44,51.5 L44,60 C44,63 56,63 56,60 L56,51.5" fill="none" stroke="#00ff87" stroke-width="2"/>
                    <path d="M62,48 L66,58 L64,59" fill="none" stroke="#00f2fe" stroke-width="1.5"/>
                </svg>
                
                </div>

            <h1>BUKU PENDAFTARAN SPMB TAHUN 2026</h1>
            <p>UPTD SDN 21 SANGGALEA</p>
        </header>

        <div class="nav-wrapper">
            <span style="font-family:'Rajdhani'; color: var(--text-muted)">SYSTEM STATUS: <span style="color:var(--success-neon)">ONLINE</span></span>
            <button class="btn-toggle" id="btnTogglePanel" onclick="togglePanel()">
                <i class="fa-solid fa-user-gear"></i> Ke Panel Admin
            </button>
        </div>

        <div id="sectionPendaftaran">
            <form id="formSpmb" onsubmit="handleSubmit(event)">
                
                <div class="panel-card">
                    <h2><i class="fa-solid fa-graduation-cap"></i> Data Calon Peserta Didik</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nomor Pendaftaran</label>
                            <input type="text" id="nomor_pendaftaran" placeholder="Contoh: 2026-001" required>
                        </div>
                        <div class="form-group">
                            <label>Nama Lengkap Siswa</label>
                            <input type="text" id="nama_siswa" placeholder="Masukkan nama lengkap" required>
                        </div>
                        <div class="form-group">
                            <label>Jenis Kelamin</label>
                            <select id="jenis_kelamin" required>
                                <option value="">-- Pilih Jenis Kelamin --</option>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Tempat, Tanggal Lahir</label>
                            <input type="text" id="ttl" placeholder="Contoh: Makassar, 15 Agustus 2019" required>
                        </div>
                        <div class="form-group">
                            <label>Asal Sekolah (TK/PAUD)</label>
                            <input type="text" id="asal_sekolah" placeholder="Kosongkan jika tidak ada">
                        </div>
                        <div class="form-group">
                            <label>No. HP / WhatsApp (Aktif)</label>
                            <input type="text" id="no_hp" placeholder="Contoh: 081234567890" required>
                        </div>
                    </div>
                </div>

                <div class="panel-card">
                    <h2><i class="fa-solid fa-user-large"></i> Data Orang Tua (Ibu)</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nama Ibu</label>
                            <input type="text" id="nama_ibu" placeholder="Masukkan nama ibu" required>
                        </div>
                        <div class="form-group">
                            <label>Keadaan Ibu</label>
                            <select id="keadaan_ibu" required>
                                <option value="">-- Pilih Keadaan --</option>
                                <option value="Hidup">Hidup</option>
                                <option value="Meninggal">Meninggal Dunia</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Tahun Lahir Ibu</label>
                            <input type="text" id="tahun_lahir_ibu" placeholder="Contoh: 1988" required>
                        </div>
                        <div class="form-group">
                            <label>Pendidikan Terakhir Ibu</label>
                            <input type="text" id="pendidikan_ibu" placeholder="Contoh: SMA / S1" required>
                        </div>
                        <div class="form-group">
                            <label>Pendapatan Ibu (Per Bulan)</label>
                            <input type="text" id="pendapatan_ibu" placeholder="Kosongkan jika Ibu Rumah Tangga">
                        </div>
                        <div class="form-group">
                            <label>Alamat Lengkap Ibu</label>
                            <input type="text" id="alamat_ibu" placeholder="Jalan, RT/RW, Desa/Kelurahan" required>
                        </div>
                    </div>
                </div>

                <div class="panel-card">
                    <h2><i class="fa-solid fa-folder-open"></i> Data Administrasi</h2>
                    <div class="form-grid">
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Nama Petugas Penerima</label>
                            <input type="text" id="nama_petugas" placeholder="Nama Panitia/Petugas" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit"><i class="fa-solid fa-paper-plane"></i> Submit Data Pendaftaran</button>
                </div>

            </form>
        </div>

        <div id="sectionAdmin" class="panel-card hidden">
            <h2><i class="fa-solid fa-database"></i> Panel Admin Database Pendaftaran</h2>
            <div style="margin-bottom: 15px; display:flex; gap:10px;">
                <button class="btn-print" onclick="printAll()"><i class="fa-solid fa-print"></i> Cetak Semua Data</button>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>No. Reg</th>
                            <th>Nama Siswa</th>
                            <th>L/P</th>
                            <th>No. HP</th>
                            <th>Nama Ibu</th>
                            <th>Petugas</th>
                            <th class="no-print">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="printArea" class="hidden"></div>

    <script>
        // TODO: GANTI DENGAN KREDENSIAL SUPABASE ANDA SENDIRI
        const SUPABASE_URL = "https://YOUR_SUPABASE_PROJECT_URL.supabase.co";
        const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentView = "pendaftaran";
        let localDataStore = [];

        fetchData();

        function togglePanel() {
            const btn = document.getElementById('btnTogglePanel');
            const secPendaftaran = document.getElementById('sectionPendaftaran');
            const secAdmin = document.getElementById('sectionAdmin');

            if(currentView === "pendaftaran") {
                currentView = "admin";
                btn.innerHTML = `<i class="fa-solid fa-file-pen"></i> Ke Form Pendaftaran`;
                secPendaftaran.classList.add('hidden');
                secAdmin.classList.remove('hidden');
                fetchData();
            } else {
                currentView = "pendaftaran";
                btn.innerHTML = `<i class="fa-solid fa-user-gear"></i> Ke Panel Admin`;
                secPendaftaran.classList.remove('hidden');
                secAdmin.classList.add('hidden');
            }
        }

        async function fetchData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;">Memuat Data Matrix...</td></tr>`;

            const { data, error } = await supabase
                .from('pendaftaran_spmb_2026')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Gagal Mengambil Data:", error);
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#ff4a4a;">Error koneksi database.</td></tr>`;
                return;
            }

            localDataStore = data;
            tbody.innerHTML = "";

            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;">Belum ada pendaftar.</td></tr>`;
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${item.nomor_pendaftaran}</b></td>
                    <td>${item.nama_siswa}</td>
                    <td>${item.jenis_kelamin === 'Laki-laki' ? 'L' : 'P'}</td>
                    <td>${item.no_hp}</td>
                    <td>${item.nama_ibu}</td>
                    <td>${item.nama_petugas}</td>
                    <td class="no-print">
                        <button class="btn-print" onclick="printSingle('${item.id}')"><i class="fa-solid fa-print"></i> Cetak</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function handleSubmit(event) {
            event.preventDefault();

            const payload = {
                nomor_pendaftaran: document.getElementById('nomor_pendaftaran').value,
                nama_siswa: document.getElementById('nama_siswa').value,
                jenis_kelamin: document.getElementById('jenis_kelamin').value,
                ttl: document.getElementById('ttl').value,
                asal_sekolah: document.getElementById('asal_sekolah').value || '-',
                no_hp: document.getElementById('no_hp').value,
                nama_ibu: document.getElementById('nama_ibu').value,
                keadaan_ibu: document.getElementById('keadaan_ibu').value,
                tahun_lahir_ibu: document.getElementById('tahun_lahir_ibu').value,
                pendidikan_ibu: document.getElementById('pendidikan_ibu').value,
                pendapatan_ibu: document.getElementById('pendapatan_ibu').value || 'Ibu Rumah Tangga',
                alamat_ibu: document.getElementById('alamat_ibu').value,
                nama_petugas: document.getElementById('nama_petugas').value
            };

            const { data, error } = await supabase
                .from('pendaftaran_spmb_2026')
                .insert([payload]);

            if (error) {
                alert("Gagal menyimpan data! Periksa konfigurasi Supabase Anda.\nDetail: " + error.message);
            } else {
                alert("Data Calon Peserta Didik Berhasil Disimpan di Supabase!");
                document.getElementById('formSpmb').reset();
                fetchData();
            }
        }

        function printSingle(id) {
            const item = localDataStore.find(x => x.id == id);
            if(!item) return;

            const printArea = document.getElementById('printArea');
            printArea.innerHTML = `
                <div class="print-header">
                    <h2>UPTD SDN 21 SANGGALEA</h2>
                    <h3>BUKTI PENDAFTARAN SISWA BARU (SPMB TAHUN 2026)</h3>
                </div>
                <table class="print-table" style="margin-top:20px;">
                    <tr><td width="30%"><b>Nomor Pendaftaran</b></td><td>${item.nomor_pendaftaran}</td></tr>
                    <tr><td><b>Nama Lengkap Siswa</b></td><td>${item.nama_siswa}</td></tr>
                    <tr><td><b>Jenis Kelamin</b></td><td>${item.jenis_kelamin}</td></tr>
                    <tr><td><b>Tempat, Tanggal Lahir</b></td><td>${item.ttl}</td></tr>
                    <tr><td><b>Asal Sekolah (TK/PAUD)</b></td><td>${item.asal_sekolah}</td></tr>
                    <tr><td><b>No. HP / WhatsApp</b></td><td>${item.no_hp}</td></tr>
                    <tr><td colspan="2" style="background:#f0f0f0;"><b>DATA ORANG TUA (IBU)</b></td></tr>
                    <tr><td><b>Nama Ibu</b></td><td>${item.nama_ibu} (${item.keadaan_ibu})</td></tr>
                    <tr><td><b>Tahun Lahir / Pendidikan</b></td><td>${item.tahun_lahir_ibu} / ${item.pendidikan_ibu}</td></tr>
                    <tr><td><b>Pendapatan Per Bulan</b></td><td>${item.pendapatan_ibu}</td></tr>
                    <tr><td><b>Alamat Lengkap Ibu</b></td><td>${item.alamat_ibu}</td></tr>
                    <tr><td colspan="2" style="background:#f0f0f0;"><b>VALIDASI</b></td></tr>
                    <tr><td><b>Petugas Penerima</b></td><td>${item.nama_petugas}</td></tr>
                </table>
                <div style="margin-top:50px; text-align:right;">
                    <p>Sanggalea, ____________ 2026</p>
                    <br><br><br>
                    <p>( ________________________ )</p>
                    <p>Panitia SPMB / Petugas</p>
                </div>
            `;
            window.print();
        }

        function printAll() {
            if(localDataStore.length === 0) return alert("Tidak ada data untuk dicetak.");

            const printArea = document.getElementById('printArea');
            let tableRows = "";
            
            localDataStore.forEach((item, index) => {
                tableRows += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.nomor_pendaftaran}</td>
                        <td>${item.nama_siswa}</td>
                        <td>${item.jenis_kelamin}</td>
                        <td>${item.no_hp}</td>
                        <td>${item.nama_ibu}</td>
                        <td>${item.nama_petugas}</td>
                    </tr>
                `;
            });

            printArea.innerHTML = `
                <div class="print-header">
                    <h2>UPTD SDN 21 SANGGALEA</h2>
                    <h3>REKAPITULASI BUKU PENDAFTARAN SPMB TAHUN 2026</h3>
                </div>
                <table class="print-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>No. Pendaftaran</th>
                            <th>Nama Siswa</th>
                            <th>L/P</th>
                            <th>No. HP / WA</th>
                            <th>Nama Ibu</th>
                            <th>Petugas Penerima</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
            `;
            window.print();
        }
    </script>
</body>
</html>
